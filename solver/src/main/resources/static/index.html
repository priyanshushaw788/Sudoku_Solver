<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Game</title>

    <style>
        body {
            font-family: Arial;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f4f7f6;
        }

#sudoku-board {
    display: grid;
    grid-template-columns: repeat(9, 50px);
    grid-template-rows: repeat(9, 50px);
    border: 3px solid black; /* Outer border */
}

.cell {
    width: 50px;
    height: 50px;
    text-align: center;
    font-size: 22px;
    border: 1px solid #ccc;  /* Normal cell borders */
    box-sizing: border-box;
    outline: none;
}

/* 🔥 Thick borders for 3x3 blocks */
.border-right {
    border-right: 3px solid black !important;
}

.border-bottom {
    border-bottom: 3px solid black !important;
}

/* Optional styling */
.locked { background: #ddd; }
.error { background: #ffcccc; color: red; }

        .controls {
            margin-top: 20px;
        }

        button {
            padding: 10px;
            margin: 5px;
        }
    </style>
</head>

<body>

<h2>Sudoku Game</h2>

<div id="sudoku-board"></div>

<div class="controls">
    <select id="difficulty">
        <option value="30">Easy</option>
        <option value="40" selected>Medium</option>
        <option value="50">Hard</option>
        <option value="60">Expert</option>
    </select>

    <button onclick="generatePuzzle()">New Game</button>
    <button onclick="initializeEmptyBoard()">Clear</button>
</div>

<h3 id="message"></h3>

<script>

    const API_BASE_URL = "http://localhost:8080/api/sudoku";

    window.onload = initializeEmptyBoard;

   function initializeEmptyBoard() {
    const board = document.getElementById("sudoku-board");
    board.innerHTML = "";

    for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {

            let input = document.createElement("input");
            input.classList.add("cell");
            input.maxLength = 1;
            input.id = `cell-${r}-${c}`;

            // 🔥 Add thick borders after every 3rd row/column
            if ((c + 1) % 3 === 0 && c !== 8) {
                input.classList.add("border-right");
            }

            if ((r + 1) % 3 === 0 && r !== 8) {
                input.classList.add("border-bottom");
            }

            input.addEventListener("input", function () {
                this.value = this.value.replace(/[^1-9]/g, '');
                validateBoard();

                if (checkCompletion()) {
                    setMessage("🎉 You solved it!");
                }
            });

            board.appendChild(input);
        }
    }
}


    async function generatePuzzle() {
        const difficulty = document.getElementById("difficulty").value;

        const res = await fetch(`${API_BASE_URL}/generate?emptySpaces=${difficulty}`);
        const board = await res.json();

        populateBoard(board);
        setMessage("");
    }

    function populateBoard(matrix) {
        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                let cell = document.getElementById(`cell-${r}-${c}`);

                cell.classList.remove("locked", "error", "correct");
                cell.readOnly = false;

                if (matrix[r][c] !== 0) {
                    cell.value = matrix[r][c];
                    cell.classList.add("locked");
                    cell.readOnly = true;
                } else {
                    cell.value = "";
                }
            }
        }
    }

    function readBoard() {
        let board = [];

        for (let r = 0; r < 9; r++) {
            let row = [];
            for (let c = 0; c < 9; c++) {
                let val = document.getElementById(`cell-${r}-${c}`).value;
                row.push(val === "" ? 0 : parseInt(val));
            }
            board.push(row);
        }
        return board;
    }

    function validateBoard() {
        let board = readBoard();

        document.querySelectorAll(".cell").forEach(cell => {
            cell.classList.remove("error");
        });

        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                if (board[r][c] === 0) continue;

                if (!isValid(board, r, c, board[r][c])) {
                    document.getElementById(`cell-${r}-${c}`).classList.add("error");
                }
            }
        }
    }

    function isValid(board, row, col, num) {

        for (let c = 0; c < 9; c++) {
            if (c !== col && board[row][c] === num) return false;
        }

        for (let r = 0; r < 9; r++) {
            if (r !== row && board[r][col] === num) return false;
        }

        let sr = row - row % 3;
        let sc = col - col % 3;

        for (let r = 0; r < 3; r++) {
            for (let c = 0; c < 3; c++) {
                let rr = sr + r;
                let cc = sc + c;

                if ((rr !== row || cc !== col) && board[rr][cc] === num) {
                    return false;
                }
            }
        }

        return true;
    }

    function checkCompletion() {
        let board = readBoard();

        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                if (board[r][c] === 0 || !isValid(board, r, c, board[r][c])) {
                    return false;
                }
            }
        }
        return true;
    }

    function setMessage(msg) {
        document.getElementById("message").innerText = msg;
    }

</script>

</body>
</html>
